<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Auth Demo</title>
</head>
<body>
    {% if messages %}
    <ul>
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    {% if user.is_authenticated %}
    Logged in as {{ user.username }} | <a href="{% url 'logout' %}">Logout</a>
    {% else %}
    <a href="{% url 'login' %}">Login</a> | <a href="{% url 'register' %}">Register</a>
    {% endif %} 
    <hr>
    {% block content %}
    {% endblock %}
</body>
</html>
